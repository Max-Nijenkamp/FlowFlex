x-app-env: &app-env
  APP_ENV: local
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: flowflex
  DB_USERNAME: flowflex
  DB_PASSWORD: secret
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PASSWORD: secret
  REDIS_PORT: 6379
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  MAIL_MAILER: smtp
  MAIL_HOST: mailpit
  MAIL_PORT: 1025
  SCOUT_DRIVER: meilisearch
  MEILISEARCH_HOST: http://meilisearch:7700
  MEILISEARCH_KEY: masterKey

services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: flowflex_app
    working_dir: /var/www
    environment:
      <<: *app-env
    volumes:
      - ./app:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [flowflex]
    develop:
      watch:
        - action: sync
          path: ./app
          target: /var/www
          ignore: [vendor/, node_modules/]

  nginx:
    image: nginx:alpine
    container_name: flowflex_nginx
    ports: ["8080:80"]
    volumes:
      - ./app:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [flowflex]

  postgres:
    image: postgres:17
    container_name: flowflex_postgres
    environment:
      POSTGRES_DB: flowflex
      POSTGRES_USER: flowflex
      POSTGRES_PASSWORD: secret
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowflex"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [flowflex]

  redis:
    image: redis:8-alpine
    container_name: flowflex_redis
    command: ["redis-server", "--requirepass", "secret"]
    # No host port published — a Redis already runs on host :6379. Containers
    # reach this one as `redis:6379` over the internal network.
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secret", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [flowflex]

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: flowflex_meilisearch
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
    ports: ["7700:7700"]
    volumes: ["meili:/meili_data"]
    networks: [flowflex]

  mailpit:
    image: axllent/mailpit
    container_name: flowflex_mailpit
    # Internal-only (host already runs Mailpit). App sends to mailpit:1025;
    # inspect via `docker compose exec mailpit ...` or temporarily publish 8025.
    expose: ["1025", "8025"]
    networks: [flowflex]

  horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: flowflex_horizon
    working_dir: /var/www
    environment:
      <<: *app-env
    command: ["php", "artisan", "horizon"]
    volumes: ["./app:/var/www"]
    depends_on: [app, redis, postgres]
    restart: unless-stopped
    networks: [flowflex]

  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: flowflex_reverb
    working_dir: /var/www
    environment:
      <<: *app-env
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8081"]
    volumes: ["./app:/var/www"]
    # Host port left unpublished (host ports saturated). Publish "<free>:8081"
    # when doing real-time/browser WebSocket work.
    expose: ["8081"]
    depends_on: [app, redis]
    restart: unless-stopped
    networks: [flowflex]

networks:
  flowflex:
    driver: bridge

volumes:
  pgdata:
  meili:
