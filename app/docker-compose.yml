services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowflex_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file: .env
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor
      - node_modules_cache:/var/www/html/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flowflex

  nginx:
    image: nginx:alpine
    container_name: flowflex_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - flowflex

  postgres:
    image: postgres:17-alpine
    container_name: flowflex_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: flowflex
      POSTGRES_USER: flowflex
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowflex"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - flowflex

  redis:
    image: redis:8-alpine
    container_name: flowflex_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - flowflex

  mailpit:
    image: axllent/mailpit:latest
    container_name: flowflex_mailpit
    restart: unless-stopped
    ports:
      - "8026:8025"
      - "1026:1025"
    networks:
      - flowflex

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowflex_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    env_file: .env
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor
    command: php artisan horizon
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - flowflex

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowflex_reverb
    restart: unless-stopped
    working_dir: /var/www/html
    env_file: .env
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "6001:8080"
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - flowflex

networks:
  flowflex:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  vendor_cache:
  node_modules_cache:
